<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroydvor AI Agent | Главная</title>
    <!-- Подключаем React, Babel и Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Иконки через SVG
        const Icons = {
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Paperclip: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.51a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Layout: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Calculator: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>,
            ShoppingCart: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        };

        const MOCK_1C_DB = [
            { id: 1, name: "Линолеум Версаль Сахалин 3м", price: 660, unit: "м²", stock: 45, warehouse: "Склад Энгельс", img: "https://images.unsplash.com/photo-1581850518616-bcb8186c443e?auto=format&fit=crop&q=80&w=600", category: "линолеум" },
            { id: 2, name: "Ламинат Classen Дуб Светлый", price: 1250, unit: "м²", stock: 120, warehouse: "Маяковского, 157", img: "https://images.unsplash.com/photo-1516455590571-18256e5bb9ff?auto=format&fit=crop&q=80&w=600", category: "ламинат" },
            { id: 3, name: "Краска Tikkurila Euro Power 7", price: 4200, unit: "9л", stock: 15, warehouse: "Центральный Склад", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?auto=format&fit=crop&q=80&w=600", category: "краска" },
            { id: 4, name: "Плитка керамогранит Loft Grey", price: 1890, unit: "м²", stock: 88, warehouse: "Склад Энгельс", img: "https://images.unsplash.com/photo-1523413555809-0fb8a4da203d?auto=format&fit=crop&q=80&w=600", category: "плитка" }
        ];

        const QUICK_QUERIES = [
            { id: 'tile', label: 'Плитка', icon: '🧱' },
            { id: 'linoleum', label: 'Линолеум', icon: '📜' },
            { id: 'laminate', label: 'Ламинат', icon: '🪵' },
            { id: 'calc', label: 'Рассчитай стоимость', icon: '🧮' },
            { id: 'paint', label: 'Краска', icon: '🎨' }
        ];

        function App() {
            const [messages, setMessages] = useState([{ role: 'bot', text: 'Здравствуйте! Я ИИ-ассистент Стройдвора. Могу помочь подобрать материалы или рассчитать их количество. Что вас интересует?' }]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [loadingPhase, setLoadingPhase] = useState('');
            const [activeVisual, setActiveVisual] = useState(null);
            const [activeProduct, setActiveProduct] = useState(null);
            const [previewImage, setPreviewImage] = useState(null);
            const [cartCount, setCartCount] = useState(0);
            const chatEndRef = useRef(null);

            const scrollToBottom = () => chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            useEffect(scrollToBottom, [messages]);

            const handleSend = async (textOverride = null) => {
                const text = textOverride || input;
                if (!text && !previewImage) return;

                setMessages(prev => [...prev, { role: 'user', text: text || "Анализ фото", image: previewImage }]);
                setInput('');
                setPreviewImage(null);
                setLoading(true);

                setLoadingPhase("Синхронизация с 1С...");
                
                setTimeout(() => {
                    const lowerText = text.toLowerCase();
                    let responseText = "Я проанализировал ваш запрос. Вот подходящий вариант из нашего каталога:";
                    let foundProduct = null;

                    if (lowerText.includes("плитк")) foundProduct = MOCK_1C_DB.find(p => p.category === "плитка");
                    else if (lowerText.includes("линолеум")) foundProduct = MOCK_1C_DB.find(p => p.category === "линолеум");
                    else if (lowerText.includes("ламинат")) foundProduct = MOCK_1C_DB.find(p => p.category === "ламинат");
                    else if (lowerText.includes("краск")) foundProduct = MOCK_1C_DB.find(p => p.category === "краска");
                    else if (lowerText.includes("рассчитай") || lowerText.includes("стоимост")) {
                        responseText = "Для точного расчета стоимости мне нужно знать площадь помещения. Но если мы возьмем среднюю комнату 20 м², то отделка качественным ламинатом обойдется примерно в 25 000 руб.";
                    } else {
                        responseText = "Интересный выбор! Я подобрал для вас несколько популярных позиций, которые сейчас есть в наличии на складе.";
                    }
                    
                    setMessages(prev => [...prev, { 
                        role: 'bot', 
                        text: responseText
                    }]);
                    
                    if (foundProduct) setActiveProduct(foundProduct);
                    setLoading(false);
                    setLoadingPhase("");
                }, 1200);
            };

            const addToCart = () => {
                setCartCount(prev => prev + 1);
                // Имитация уведомления
                setMessages(prev => [...prev, { role: 'bot', text: `Товар "${activeProduct.name}" успешно добавлен в вашу корзину!` }]);
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setPreviewImage(ev.target.result);
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="w-full min-h-screen flex items-center justify-center p-4 lg:p-8">
                    <div className="w-full max-w-7xl h-[750px] bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col lg:flex-row border border-slate-200">
                        
                        {/* ЛЕВАЯ ПАНЕЛЬ: ЧАТ */}
                        <div className="w-full lg:w-[420px] border-r border-slate-100 flex flex-col bg-white shrink-0">
                            <div className="p-6 border-b bg-[#00569c] text-white flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-[#00569c] font-black shadow-lg">СД</div>
                                    <div>
                                        <h3 className="font-bold text-sm leading-none">ИИ-Помощник</h3>
                                        <span className="text-[10px] opacity-70 uppercase tracking-widest mt-1 block">База данных онлайн</span>
                                    </div>
                                </div>
                                <div className="relative">
                                    <Icons.ShoppingCart />
                                    {cartCount > 0 && (
                                        <span className="absolute -top-2 -right-2 bg-[#f39200] text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center animate-bounce">
                                            {cartCount}
                                        </span>
                                    )}
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50 scrollbar-hide">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-4 text-sm leading-relaxed shadow-sm ${
                                            msg.role === 'user' ? 'bg-[#00569c] text-white rounded-2xl rounded-tr-none' : 'bg-white text-slate-700 rounded-2xl rounded-tl-none border border-slate-100'
                                        }`}>
                                            {msg.image && <img src={msg.image} className="rounded-lg mb-2 max-h-32 w-full object-cover" />}
                                            {msg.text}
                                        </div>
                                    </div>
                                ))}
                                {loading && (
                                    <div className="flex items-center gap-2 text-[#00569c] font-bold text-[10px] p-2">
                                        <div className="w-2 h-2 bg-[#00569c] rounded-full animate-ping"></div>
                                        {loadingPhase}
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            {/* Блок быстрых запросов */}
                            <div className="px-4 py-3 bg-white border-t border-slate-50 flex flex-wrap gap-2">
                                {QUICK_QUERIES.map(q => (
                                    <button 
                                        key={q.id}
                                        onClick={() => handleSend(q.label)}
                                        className="px-3 py-1.5 bg-slate-100 hover:bg-[#00569c] hover:text-white rounded-full text-[11px] font-semibold text-slate-600 transition-all flex items-center gap-1.5 active:scale-95"
                                    >
                                        <span>{q.icon}</span> {q.label}
                                    </button>
                                ))}
                            </div>

                            <div className="p-4 border-t bg-white">
                                {previewImage && (
                                    <div className="mb-2 relative inline-block">
                                        <img src={previewImage} className="w-16 h-16 rounded-xl object-cover border-2 border-[#f39200]" />
                                        <button onClick={() => setPreviewImage(null)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md"><Icons.X /></button>
                                    </div>
                                )}
                                <div className="flex items-center gap-2 bg-slate-100 p-2 rounded-2xl">
                                    <label className="p-2 text-slate-400 hover:text-[#00569c] cursor-pointer">
                                        <Icons.Paperclip />
                                        <input type="file" className="hidden" accept="image/*" onChange={handleFile} />
                                    </label>
                                    <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSend()} placeholder="Напишите ваш запрос..." className="flex-1 bg-transparent border-none text-sm outline-none px-2" />
                                    <button onClick={() => handleSend()} className="bg-[#00569c] text-white p-3 rounded-xl hover:scale-105 active:scale-95 transition-all">
                                        <Icons.Send />
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* ПРАВАЯ ПАНЕЛЬ: ХОЛСТ */}
                        <div className="flex-1 bg-[#f8fafc] p-8 flex flex-col relative overflow-hidden">
                            <div className="flex items-center justify-between mb-8">
                                <div className="flex items-center gap-4">
                                    <div className="bg-white p-3 rounded-2xl shadow-sm text-[#00569c]"><Icons.Layout /></div>
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight uppercase">Витрина и Проект</h2>
                                </div>
                                <div className="hidden lg:flex gap-4">
                                    <div className="px-4 py-2 bg-white rounded-full text-[11px] font-bold text-slate-400 border border-slate-200 uppercase tracking-widest shadow-sm flex items-center gap-2">
                                        <span className="w-2 h-2 bg-green-500 rounded-full"></span> 1С: Соединение установлено
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1 grid grid-cols-12 gap-8 overflow-hidden">
                                {/* Область проекта */}
                                <div className="col-span-12 lg:col-span-7 bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden relative group">
                                    {activeVisual ? (
                                        <img src={activeVisual} className="w-full h-full object-cover" />
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center text-center p-12 space-y-6">
                                            <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center animate-float border-2 border-dashed border-slate-200">
                                                <Icons.Layout className="text-slate-200" size={48} />
                                            </div>
                                            <div>
                                                <h4 className="font-black text-slate-700 text-lg uppercase">Ваш дизайн-проект</h4>
                                                <p className="text-xs text-slate-400 max-w-xs mt-3 leading-relaxed">
                                                    Загрузите фото комнаты, и наш ИИ предложит варианты отделки прямо на вашем фото или создаст 3D визуализацию.
                                                </p>
                                            </div>
                                            <button className="px-6 py-3 bg-[#00569c] text-white rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-lg shadow-blue-100 hover:bg-[#004a87] transition-all">
                                                Начать проектирование
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {/* Карточка товара */}
                                <div className="col-span-12 lg:col-span-5 flex flex-col gap-6">
                                    {activeProduct ? (
                                        <div className="bg-white rounded-[40px] p-8 shadow-2xl border border-blue-50 flex flex-col animate-in slide-in-from-right-20 duration-500 h-full">
                                            <div className="flex justify-between items-start mb-6">
                                                <span className="text-[10px] font-black text-[#f39200] bg-orange-50 px-3 py-1 rounded-full uppercase tracking-wider">Выбор ИИ</span>
                                                <div className="flex items-center gap-1 text-[10px] text-green-600 font-bold uppercase">
                                                    <Icons.Check /> В наличии
                                                </div>
                                            </div>
                                            
                                            <div className="relative group overflow-hidden rounded-3xl mb-6">
                                                <img src={activeProduct.img} className="w-full h-52 object-cover group-hover:scale-110 transition-transform duration-700" />
                                            </div>
                                            
                                            <div className="flex-1">
                                                <h3 className="font-black text-slate-800 text-xl mb-2 leading-tight">{activeProduct.name}</h3>
                                                <p className="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-4">Артикул: SD-{activeProduct.id}00342</p>
                                                
                                                <div className="flex items-baseline gap-2 mb-6">
                                                    <span className="text-4xl font-black text-[#00569c] tracking-tighter">{activeProduct.price} ₽</span>
                                                    <span className="text-sm font-bold text-slate-400 italic">за {activeProduct.unit}</span>
                                                </div>

                                                <div className="space-y-3 mb-8">
                                                    <div className="flex items-center justify-between text-xs p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                                        <span className="text-slate-500 font-medium uppercase tracking-tighter">Склад</span>
                                                        <span className="font-black text-slate-700">{activeProduct.warehouse}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="flex flex-col gap-3">
                                                <button 
                                                    onClick={addToCart}
                                                    className="w-full bg-[#f39200] text-white py-5 rounded-3xl font-black shadow-xl shadow-orange-100 hover:scale-[1.03] active:scale-95 transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-sm"
                                                >
                                                    <Icons.ShoppingCart /> В КОРЗИНУ
                                                </button>
                                                <button className="w-full py-2 text-[10px] text-slate-300 font-bold uppercase hover:text-[#00569c] transition-colors">
                                                    Посмотреть характеристики
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex-1 bg-white/50 rounded-[40px] border-2 border-dashed border-slate-200 p-8 flex flex-col items-center justify-center text-center">
                                            <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                                                <Icons.ShoppingCart className="text-slate-300" />
                                            </div>
                                            <h5 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Ваша подборка</h5>
                                            <p className="text-[11px] text-slate-400 mt-3 leading-relaxed">
                                                Нажмите на быстрый запрос слева или опишите задачу, чтобы увидеть товары из актуальной базы 1С
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
