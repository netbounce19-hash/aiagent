<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroydvor AI Agent</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css">
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Вставляем иконки вручную, так как в CDN версии lucide-react работает иначе
        const Icon = ({ name, size = 20, className = "" }) => (
          <i className={`lucide-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const apiKey = ""; // Ключ будет подставлен средой выполнения

        const MOCK_1C_DB = [
          { id: 1, name: "Линолеум Версаль Сахалин 3м", price: 660, unit: "м²", stock: 45, warehouse: "Склад Энгельс", img: "https://images.unsplash.com/photo-1581850518616-bcb8186c443e?auto=format&fit=crop&q=80&w=600" },
          { id: 2, name: "Ламинат Classen Дуб Светлый", price: 1250, unit: "м²", stock: 120, warehouse: "Маяковского, 157", img: "https://images.unsplash.com/photo-1516455590571-18256e5bb9ff?auto=format&fit=crop&q=80&w=600" },
          { id: 3, name: "Краска Tikkurila Euro Power 7", price: 4200, unit: "9л", stock: 15, warehouse: "Центральный Склад", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?auto=format&fit=crop&q=80&w=600" },
          { id: 4, name: "Плитка керамогранит Loft Grey", price: 1890, unit: "м²", stock: 88, warehouse: "Склад Энгельс", img: "https://images.unsplash.com/photo-1523413555809-0fb8a4da203d?auto=format&fit=crop&q=80&w=600" }
        ];

        function App() {
          const [messages, setMessages] = useState([{ role: 'bot', text: 'Здравствуйте! Я ИИ-ассистент Стройдвора. Чем могу помочь?', type: 'text' }]);
          const [input, setInput] = useState('');
          const [loading, setLoading] = useState(false);
          const [activeVisual, setActiveVisual] = useState(null);
          const [activeProduct, setActiveProduct] = useState(null);
          const chatEndRef = useRef(null);

          const scrollToBottom = () => chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
          useEffect(scrollToBottom, [messages]);

          const handleSend = async (textOverride = null) => {
            const text = textOverride || input;
            if (!text) return;

            setMessages(prev => [...prev, { role: 'user', text }]);
            setInput('');
            setLoading(true);

            setTimeout(() => {
              const lowerText = text.toLowerCase();
              const product = MOCK_1C_DB.find(p => lowerText.includes(p.name.split(' ')[0].toLowerCase()));
              
              setMessages(prev => [...prev, { 
                role: 'bot', 
                text: product ? `Я нашел подходящий вариант: ${product.name}. Он есть в наличии.` : "Хороший выбор! Рассказать подробнее о характеристиках?" 
              }]);
              
              if (product) setActiveProduct(product);
              setLoading(false);
            }, 1000);
          };

          return (
            <div className="w-full min-h-screen bg-slate-100 flex items-center justify-center p-4">
              <div className="w-full max-w-6xl h-[600px] bg-white rounded-[32px] shadow-2xl overflow-hidden flex flex-row border border-slate-200">
                {/* Чат */}
                <div className="w-80 border-r border-slate-100 flex flex-col bg-white">
                  <div className="p-4 border-b bg-[#00569c] text-white flex items-center gap-3">
                    <div className="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-[#00569c] font-bold">СД</div>
                    <span className="font-bold text-sm">ИИ-Помощник</span>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/30 scrollbar-hide">
                    {messages.map((msg, i) => (
                      <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className={`max-w-[90%] p-3 text-xs rounded-2xl ${msg.role === 'user' ? 'bg-[#00569c] text-white' : 'bg-white border text-slate-700'}`}>
                          {msg.text}
                        </div>
                      </div>
                    ))}
                    <div ref={chatEndRef} />
                  </div>
                  <div className="p-4 border-t flex gap-2">
                    <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSend()} className="flex-1 bg-slate-100 border-none rounded-lg px-3 py-2 text-xs outline-none" placeholder="Вопрос..." />
                    <button onClick={() => handleSend()} className="bg-[#00569c] text-white p-2 rounded-lg"><i className="lucide-send"></i></button>
                  </div>
                </div>

                {/* Холст */}
                <div className="flex-1 bg-slate-50 p-6 flex flex-col">
                  <h2 className="text-lg font-bold mb-4 text-slate-800 flex items-center gap-2">
                    <i className="lucide-layout text-[#00569c]"></i> Визуализация и товары
                  </h2>
                  <div className="flex-1 grid grid-cols-2 gap-4 overflow-hidden">
                    <div className="bg-white rounded-2xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center text-slate-400">
                      {activeVisual ? <img src={activeVisual} className="w-full h-full object-cover rounded-2xl" /> : <p className="text-xs">Тут появится проект</p>}
                    </div>
                    <div className="space-y-4">
                      {activeProduct ? (
                        <div className="bg-white p-4 rounded-2xl border shadow-sm">
                          <img src={activeProduct.img} className="w-full h-32 object-cover rounded-xl mb-2" />
                          <h4 className="font-bold text-sm text-[#00569c]">{activeProduct.name}</h4>
                          <p className="text-lg font-black text-[#f39200]">{activeProduct.price} ₽</p>
                          <button className="w-full mt-3 bg-[#f39200] text-white py-2 rounded-lg text-xs font-bold">В КОРЗИНУ</button>
                        </div>
                      ) : (
                        <div className="h-full bg-white/50 rounded-2xl border border-dashed flex items-center justify-center text-slate-400 text-xs text-center p-4">
                          Выберите товар в чате
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
