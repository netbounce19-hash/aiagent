<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroydvor AI Agent | Главная</title>
    <!-- Подключаем React, Babel и Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Иконки через SVG, чтобы не зависеть от внешних шрифтов
        const Icons = {
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Paperclip: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.51a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Layout: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        };

        const apiKey = ""; // Ключ API

        const MOCK_1C_DB = [
            { id: 1, name: "Линолеум Версаль Сахалин 3м", price: 660, unit: "м²", stock: 45, warehouse: "Склад Энгельс", img: "https://images.unsplash.com/photo-1581850518616-bcb8186c443e?auto=format&fit=crop&q=80&w=600" },
            { id: 2, name: "Ламинат Classen Дуб Светлый", price: 1250, unit: "м²", stock: 120, warehouse: "Маяковского, 157", img: "https://images.unsplash.com/photo-1516455590571-18256e5bb9ff?auto=format&fit=crop&q=80&w=600" },
            { id: 3, name: "Краска Tikkurila Euro Power 7", price: 4200, unit: "9л", stock: 15, warehouse: "Центральный Склад", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?auto=format&fit=crop&q=80&w=600" },
            { id: 4, name: "Плитка керамогранит Loft Grey", price: 1890, unit: "м²", stock: 88, warehouse: "Склад Энгельс", img: "https://images.unsplash.com/photo-1523413555809-0fb8a4da203d?auto=format&fit=crop&q=80&w=600" }
        ];

        function App() {
            const [messages, setMessages] = useState([{ role: 'bot', text: 'Здравствуйте! Я ИИ-ассистент Стройдвора. Загрузите фото или опишите ваш проект.' }]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [loadingPhase, setLoadingPhase] = useState('');
            const [activeVisual, setActiveVisual] = useState(null);
            const [activeProduct, setActiveProduct] = useState(null);
            const [previewImage, setPreviewImage] = useState(null);
            const chatEndRef = useRef(null);

            const scrollToBottom = () => chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            useEffect(scrollToBottom, [messages]);

            const handleSend = async (textOverride = null) => {
                const text = textOverride || input;
                if (!text && !previewImage) return;

                setMessages(prev => [...prev, { role: 'user', text: text || "Анализ фото", image: previewImage }]);
                setInput('');
                setPreviewImage(null);
                setLoading(true);

                // Имитация процесса
                setLoadingPhase("Анализ данных 1С...");
                setTimeout(() => {
                    const lowerText = text.toLowerCase();
                    const product = MOCK_1C_DB.find(p => lowerText.includes(p.name.split(' ')[0].toLowerCase()) || lowerText.includes("линолеум") && p.name.includes("Линолеум"));
                    
                    setMessages(prev => [...prev, { 
                        role: 'bot', 
                        text: product ? `Отличный выбор! Модель "${product.name}" идеально подойдет. У нас как раз есть в наличии на складе.` : "Я подготовил для вас визуализацию и подобрал лучшие материалы из нашего каталога." 
                    }]);
                    
                    if (product) setActiveProduct(product);
                    setLoading(false);
                    setLoadingPhase("");
                }, 1500);
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setPreviewImage(ev.target.result);
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="w-full min-h-screen flex items-center justify-center p-4 lg:p-8">
                    <div className="w-full max-w-7xl h-[700px] bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col lg:flex-row border border-slate-200">
                        
                        {/* ЛЕВАЯ ПАНЕЛЬ: ЧАТ */}
                        <div className="w-full lg:w-[400px] border-r border-slate-100 flex flex-col bg-white shrink-0">
                            <div className="p-6 border-b bg-[#00569c] text-white flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-[#00569c] font-black shadow-lg">СД</div>
                                    <div>
                                        <h3 className="font-bold text-sm leading-none">ИИ-Помощник</h3>
                                        <span className="text-[10px] opacity-70 uppercase tracking-widest mt-1 block">Live Support</span>
                                    </div>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50 scrollbar-hide">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-4 text-sm leading-relaxed shadow-sm ${
                                            msg.role === 'user' ? 'bg-[#00569c] text-white rounded-2xl rounded-tr-none' : 'bg-white text-slate-700 rounded-2xl rounded-tl-none border border-slate-100'
                                        }`}>
                                            {msg.image && <img src={msg.image} className="rounded-lg mb-2 max-h-32 w-full object-cover" />}
                                            {msg.text}
                                        </div>
                                    </div>
                                ))}
                                {loading && (
                                    <div className="flex items-center gap-2 text-[#00569c] font-bold text-[10px] p-2">
                                        <div className="w-2 h-2 bg-[#00569c] rounded-full animate-ping"></div>
                                        {loadingPhase}
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            <div className="p-4 border-t bg-white">
                                {previewImage && (
                                    <div className="mb-2 relative inline-block">
                                        <img src={previewImage} className="w-16 h-16 rounded-xl object-cover border-2 border-[#f39200]" />
                                        <button onClick={() => setPreviewImage(null)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md"><Icons.X /></button>
                                    </div>
                                )}
                                <div className="flex items-center gap-2 bg-slate-100 p-2 rounded-2xl">
                                    <label className="p-2 text-slate-400 hover:text-[#00569c] cursor-pointer">
                                        <Icons.Paperclip />
                                        <input type="file" className="hidden" accept="image/*" onChange={handleFile} />
                                    </label>
                                    <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSend()} placeholder="Ваш вопрос..." className="flex-1 bg-transparent border-none text-sm outline-none px-2" />
                                    <button onClick={() => handleSend()} className="bg-[#00569c] text-white p-3 rounded-xl hover:scale-105 active:scale-95 transition-all">
                                        <Icons.Send />
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* ПРАВАЯ ПАНЕЛЬ: ХОЛСТ */}
                        <div className="flex-1 bg-[#f8fafc] p-8 flex flex-col relative overflow-hidden">
                            <div className="flex items-center justify-between mb-8">
                                <div className="flex items-center gap-4">
                                    <div className="bg-white p-3 rounded-2xl shadow-sm text-[#00569c]"><Icons.Layout /></div>
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight">Рабочая область проекта</h2>
                                </div>
                                <div className="px-4 py-2 bg-white rounded-full text-[11px] font-bold text-slate-400 border border-slate-200 uppercase tracking-widest shadow-sm">
                                    Status: Connected to 1C
                                </div>
                            </div>

                            <div className="flex-1 grid grid-cols-12 gap-6 overflow-hidden">
                                <div className="col-span-12 lg:col-span-8 bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden relative group">
                                    {activeVisual ? (
                                        <img src={activeVisual} className="w-full h-full object-cover" />
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center text-center p-12 space-y-4">
                                            <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center animate-float border-2 border-dashed border-slate-200">
                                                <Icons.Layout className="text-slate-300" />
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-slate-600">Здесь появится ваш проект</h4>
                                                <p className="text-xs text-slate-400 max-w-xs mt-2">Загрузите фото комнаты или опишите интерьер в чате, и я создам визуализацию.</p>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="col-span-12 lg:col-span-4 flex flex-col gap-4">
                                    {activeProduct ? (
                                        <div className="bg-white rounded-[32px] p-6 shadow-xl border border-blue-50 flex flex-col animate-in slide-in-from-right-10 duration-500">
                                            <span className="text-[10px] font-black text-[#f39200] uppercase tracking-[0.2em] mb-4">Рекомендация ИИ</span>
                                            <img src={activeProduct.img} className="w-full h-40 object-cover rounded-2xl mb-4" />
                                            <h3 className="font-bold text-slate-800 text-lg mb-1">{activeProduct.name}</h3>
                                            <div className="text-2xl font-black text-[#00569c] mb-6">{activeProduct.price} ₽ <span className="text-xs font-normal text-slate-400">/ {activeProduct.unit}</span></div>
                                            
                                            <div className="bg-green-50 p-3 rounded-xl border border-green-100 mb-6">
                                                <div className="flex items-center gap-2 text-green-700 text-xs font-bold uppercase tracking-wider">
                                                    <Icons.Check /> В наличии
                                                </div>
                                                <div className="text-[10px] text-green-600/70 mt-1">{activeProduct.warehouse}</div>
                                            </div>

                                            <button className="w-full bg-[#f39200] text-white py-4 rounded-2xl font-black shadow-lg shadow-orange-100 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
                                                В КОРЗИНУ
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="flex-1 bg-slate-100/50 rounded-[32px] border-2 border-dashed border-slate-200 p-8 flex flex-col items-center justify-center text-center">
                                            <div className="text-slate-300 text-[10px] font-bold uppercase tracking-widest">Подбор материалов</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
